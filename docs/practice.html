<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>German · Practice</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="lock"></div>

  <main hidden>
    <header class="topbar">
      <span class="brand"><img src="img/richter.svg" alt="" />German with Frau Richter</span>
      <nav>
        <a href="index.html">Dashboard</a>
        <a href="lessons.html">Lessons</a>
        <a href="assignments.html">Assignments</a>
        <a href="practice.html" class="active">Practice</a>
        <a href="settings.html">Settings</a>
        <button class="lock-link" id="lock-now" title="Forget the password in this tab">Lock</button>
      </nav>
    </header>

    <!-- Mode selection -->
    <section class="panel" id="mode-select">
      <h1 class="hw-title">Practice drills</h1>
      <p class="muted">Voluntary reps, sampled from everything already published. No report is filed —
      but the log notes that you drilled, and she reads the log.</p>
      <div class="mode-grid" id="mode-grid">
        <button class="mode-card" data-mode="mistakes" disabled>
          <span class="mode-name">Previous mistakes</span>
          <span class="mode-desc">Every question you missed on first try, anywhere. They come back until they sit.</span>
          <span class="mode-count" id="count-mistakes">…</span>
        </button>
        <button class="mode-card" data-mode="weak" disabled>
          <span class="mode-name">Weak areas</span>
          <span class="mode-desc">Only the categories currently flagged — by the numbers or by her hand.</span>
          <span class="mode-count" id="count-weak">…</span>
        </button>
        <button class="mode-card" data-mode="grammar" disabled>
          <span class="mode-name">Tenses &amp; forms</span>
          <span class="mode-desc">Conjugation, cases, word order, negation — the machinery.</span>
          <span class="mode-count" id="count-grammar">…</span>
        </button>
        <button class="mode-card" data-mode="harder" disabled>
          <span class="mode-name">Harder drills</span>
          <span class="mode-desc">Production only: options removed, hints removed. You type everything from memory.</span>
          <span class="mode-count" id="count-harder">…</span>
        </button>
        <button class="mode-card" data-mode="mixed" disabled>
          <span class="mode-name">Mixed review</span>
          <span class="mode-desc">Everything published so far, shuffled and interleaved.</span>
          <span class="mode-count" id="count-mixed">…</span>
        </button>
        <button class="mode-card" data-mode="vocab" disabled>
          <span class="mode-name">Vocabulary gauntlet</span>
          <span class="mode-desc">One word, ten options, most of them chosen to confuse you. She picks the distractors from your own past mistakes.</span>
          <span class="mode-count" id="count-vocab">…</span>
        </button>
      </div>
      <div class="vocab-direction" id="vocab-direction" hidden>
        <span class="muted">Vocabulary direction:</span>
        <label><input type="radio" name="vdir" value="mixed" checked /> mixed</label>
        <label><input type="radio" name="vdir" value="de-en" /> DE → EN</label>
        <label><input type="radio" name="vdir" value="en-de" /> EN → DE</label>
      </div>
      <p class="muted" id="pool-status">Decrypting the archive…</p>
    </section>

    <!-- Drill runner -->
    <section class="panel quiz-panel" id="drill-area" hidden>
      <div class="progress">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <p class="progress-label" id="progress-label"></p>
      </div>
      <div id="question-area"></div>
      <div id="feedback" class="feedback" hidden>
        <p class="feedback-head" id="feedback-head"></p>
        <p class="feedback-note" id="feedback-note"></p>
        <button class="btn btn-primary" id="feedback-next">Next</button>
      </div>
    </section>

    <!-- Summary -->
    <section class="panel" id="summary-area" hidden>
      <h2 id="summary-title"></h2>
      <p id="summary-text" class="done-summary"></p>
      <div id="summary-confusions"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="again-btn">Another round</button>
        <a class="btn" href="index.html">← Dashboard</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/practice.js"></script>
</body>
</html>
