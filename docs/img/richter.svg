<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="Frau Dr. Richter">
  <!-- Austere line-art portrait: tight bun, thin glasses, high collar, brooch. -->
  <g fill="none" stroke="#d8cfc0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- bun -->
    <circle cx="100" cy="34" r="16" />
    <path d="M88 44 Q100 52 112 44" />
    <!-- hair, pulled back hard -->
    <path d="M58 108 Q52 54 100 48 Q148 54 142 108" />
    <path d="M62 78 Q80 62 100 60 Q120 62 138 78" />
    <!-- face -->
    <path d="M66 92 Q66 148 100 156 Q134 148 134 92" />
    <!-- ears -->
    <path d="M62 104 Q56 112 63 120" />
    <path d="M138 104 Q144 112 137 120" />
    <!-- glasses: thin, rectangular, judging -->
    <rect x="70" y="98" width="24" height="16" rx="3" />
    <rect x="106" y="98" width="24" height="16" rx="3" />
    <path d="M94 105 L106 105" />
    <path d="M70 103 L63 106 M130 103 L137 106" />
    <!-- brows: one slightly raised -->
    <path d="M71 92 L93 90" />
    <path d="M107 88 L129 92" />
    <!-- nose -->
    <path d="M100 108 Q97 122 94 126 Q100 130 106 126" />
    <!-- mouth: flat. unimpressed. -->
    <path d="M86 140 L114 140" />
    <!-- neck -->
    <path d="M86 154 L84 170 M114 154 L116 170" />
    <!-- high-collar blouse -->
    <path d="M46 226 Q48 184 84 170 L100 182 L116 170 Q152 184 154 226" />
    <path d="M84 170 Q92 178 100 182 Q108 178 116 170" />
    <path d="M93 186 L100 226 M107 186 L100 226" stroke-width="2" />
    <!-- collar -->
    <path d="M88 168 L96 178 M112 168 L104 178" stroke-width="2.5" />
  </g>
  <!-- brooch: the one ornament — a small judge's seal -->
  <circle cx="100" cy="186" r="6" fill="none" stroke="#b8433a" stroke-width="3" />
  <circle cx="100" cy="186" r="1.8" fill="#b8433a" />
</svg>
